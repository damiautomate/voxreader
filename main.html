<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F0F14">
<title>VoxReader</title>
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#0F0F14;--s:#181820;--t:#E4E0D7;--t2:#6E6A62;--t3:#3E3B36;--ac:#D08C30;--acl:rgba(208,140,48,.1);--acg:rgba(208,140,48,.25);--hl:rgba(208,140,48,.14);--hla:rgba(208,140,48,.3);--bd:rgba(255,255,255,.05);--sh:rgba(0,0,0,.5);--gl:rgba(15,15,20,.96);--ch:#D08C30;--pb:#252530;--fb:'Literata',serif;--fu:'DM Sans',sans-serif;--fs:18px;--lh:1.8}
[data-th=light]{--bg:#F7F5EE;--s:#FFF;--t:#2A2722;--t2:#8A8478;--t3:#C5BFB5;--ac:#B0621E;--acl:rgba(176,98,30,.08);--acg:rgba(176,98,30,.2);--hl:rgba(255,200,60,.28);--hla:rgba(255,180,60,.42);--bd:rgba(0,0,0,.06);--sh:rgba(0,0,0,.04);--gl:rgba(247,245,238,.95);--ch:#7A4518;--pb:#E6E2D8}
[data-th=sepia]{--bg:#E8DDCA;--s:#DED2BA;--t:#3E3020;--t2:#7A654A;--ac:#7B3510;--acl:rgba(123,53,16,.08);--acg:rgba(123,53,16,.18);--hl:rgba(160,100,35,.18);--hla:rgba(160,100,35,.3);--bd:rgba(62,48,32,.08);--sh:rgba(62,48,32,.06);--gl:rgba(232,221,202,.95);--ch:#5A2D0C;--pb:#CCC0A6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t);font-family:var(--fu);min-height:100dvh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.bar{position:sticky;top:0;z-index:100;background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:8px 14px}
.bar-in{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:17px;font-weight:700;color:var(--ac);font-family:var(--fb)}
.fname{font-size:10px;color:var(--t2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:6px}
.btns{display:flex;gap:1px}
.ib{background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--t2);display:flex;align-items:center}
.ib.on{background:var(--acl);color:var(--ac)}
.ub{cursor:pointer;padding:5px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--acl);border:1px solid var(--bd);color:var(--t2);font-family:var(--fu)}
.ub input{display:none}
.top-prg{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--bd)}
.top-fill{height:100%;background:var(--ac);transition:width .4s}
.pnl{display:none;position:sticky;top:47px;z-index:90;background:var(--s);border-bottom:1px solid var(--bd);padding:12px 14px;animation:sd .2s}
.pnl.open{display:block}
.pnl-in{max-width:780px;margin:0 auto}
.pnl-t{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:1px;margin-bottom:8px}
.pnl-scr{max-height:260px;overflow-y:auto}
@keyframes sd{from{opacity:0;transform:translateY(-6px)}}
.pill{padding:4px 11px;border-radius:14px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--fu)}
.pill.on{border-color:var(--ac);background:var(--acl);color:var(--ac)}
.sr{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.sl{font-size:10px;font-weight:700;color:var(--t2);min-width:42px}
select{padding:3px 7px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--t);font-size:12px;font-family:var(--fu);outline:none}
.chi{display:block;width:100%;text-align:left;padding:9px 11px;border-radius:8px;border:none;background:transparent;cursor:pointer;margin-bottom:2px;font-family:var(--fu);color:var(--t)}
.chi:hover,.chi.cur{background:var(--acl)}
.chi .nm{font-size:13px;font-family:var(--fb)}.chi.cur .nm{font-weight:600;color:var(--ac)}
.cbar{flex:1;height:3px;border-radius:2px;background:var(--pb);overflow:hidden}
.cfill{height:100%;border-radius:2px;transition:width .3s}
.chi .cfill{background:var(--t2)}.chi.cur .cfill{background:var(--ac)}
.cpct{font-size:10px;color:var(--t2);min-width:26px;text-align:right}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--ac);animation:pls 1s infinite;flex-shrink:0}
@keyframes pls{0%,100%{opacity:.4}50%{opacity:1}}@keyframes spn{to{transform:rotate(360deg)}}
.cnt{max-width:700px;margin:0 auto;padding:20px 16px 280px}
.bp{position:relative;padding:8px 12px;margin:2px 0;border-radius:6px;border-left:3px solid transparent;cursor:pointer;transition:all .25s}
.bp:hover{background:var(--hl)}
.bp.act{background:var(--hla);border-left-color:var(--ac);box-shadow:0 2px 8px var(--sh)}
.bp p{font-size:var(--fs);line-height:var(--lh);font-family:var(--fb);margin:0}
.bc{margin:30px 0 12px;padding:10px 0;border-bottom:2px solid var(--ac);cursor:pointer}
.bc.act{background:var(--hla);border-radius:6px;padding-left:10px}
.bc h2{font-size:calc(var(--fs) + 4px);font-weight:600;font-family:var(--fb);color:var(--ch);margin:0}
.bsk{padding:3px 9px;margin:2px 0;border-radius:4px;background:rgba(255,82,82,.05);border:1px dashed rgba(255,82,82,.12);font-size:10px;color:var(--t2);opacity:.5;font-style:italic}
.bmb{position:absolute;top:5px;right:3px;background:none;border:none;cursor:pointer;padding:2px;color:var(--bd);opacity:0;transition:opacity .15s}
.bp:hover .bmb{opacity:.5}.bmb:hover{opacity:1!important}.bmb.has{opacity:1!important;color:var(--ac)}
@media(max-width:480px){.bmb{opacity:.3}.bmb.has{opacity:1}.fname{display:none}}
.pdf-sync{max-width:700px;margin:0 auto 16px;text-align:center}
.pdf-sync img{width:100%;max-width:500px;border-radius:8px;box-shadow:0 2px 12px var(--sh);border:1px solid var(--bd)}
.gen-bar{margin:8px 0;padding:8px 12px;border-radius:8px;background:var(--acl);border:1px solid var(--bd)}
.gen-info{font-size:12px;color:var(--t2);margin-bottom:5px;display:flex;justify-content:space-between}
.gen-track{height:4px;border-radius:2px;background:var(--pb);overflow:hidden}
.gen-fill{height:100%;background:var(--ac);transition:width .3s}
.player{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);box-shadow:0 -4px 20px var(--sh);padding:0 14px;padding-bottom:max(6px,env(safe-area-inset-bottom))}
.pl-in{max-width:780px;margin:0 auto}
.pl-top{display:flex;justify-content:space-between;align-items:center;padding:7px 0 0;font-size:11px}
.pl-ch{color:var(--ac);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pl-bk{color:var(--t2);flex-shrink:0;margin-left:8px}
.sc-wrap{display:flex;align-items:center;gap:7px;padding:5px 0 2px}
.sc-t{font-size:10px;color:var(--t2);font-weight:500;min-width:32px;font-variant-numeric:tabular-nums}
.sc-t.r{text-align:right}
.sc-trk{flex:1;position:relative;height:28px;display:flex;align-items:center;cursor:pointer;touch-action:none}
.sc-rail{width:100%;height:3px;border-radius:2px;background:var(--pb)}
.sc-fl{height:100%;border-radius:2px;background:var(--ac);position:relative;transition:width .12s}
.sc-th{position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:var(--ac);box-shadow:0 2px 8px var(--acg)}
.sc-trk:active .sc-th{transform:translateY(-50%) scale(1.3)}
.pl-ct{display:flex;align-items:center;justify-content:center;gap:2px;padding:2px 0 5px}
.cb{background:none;border:none;cursor:pointer;color:var(--t);padding:5px;display:flex;align-items:center}
.cb:disabled{color:var(--t3);cursor:default}.cb svg{width:22px;height:22px}
.pb-btn{width:54px;height:54px;border-radius:50%;background:var(--ac);border:none;cursor:pointer;color:var(--bg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px var(--acg);margin:0 6px}
.pb-btn:active{transform:scale(.9)}.pb-btn svg{width:26px;height:26px}
.skb{position:relative;padding:5px;background:none;border:none;cursor:pointer;color:var(--t);display:flex;align-items:center}
.skb:disabled{color:var(--t3)}.skb svg{width:28px;height:28px}
.skb span{position:absolute;font-size:8px;font-weight:700;top:50%;left:50%;transform:translate(-50%,-50%);margin-top:1px}
.spc{background:var(--acl);border:1px solid var(--bd);border-radius:12px;padding:3px 8px;cursor:pointer;color:var(--ac);font-size:11px;font-weight:700;min-width:32px;text-align:center;font-family:var(--fu);margin-left:4px}
.spinner{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spn .7s linear infinite;margin:0 auto 12px}
.bdg{position:absolute;top:1px;right:1px;width:6px;height:6px;border-radius:50%;background:var(--ac)}

/* KEY SETUP BOX */
.key-box{padding:16px;border-radius:12px;background:var(--s);border:1px solid var(--bd);margin-bottom:16px}
.key-box h3{font-size:14px;color:var(--ac);margin-bottom:8px;font-family:var(--fb)}
.key-row{display:flex;gap:6px;margin-bottom:6px}
.key-input{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);color:var(--t);font-size:13px;font-family:var(--fu);outline:none}
.key-input:focus{border-color:var(--ac)}
.key-btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--fu)}
.key-save{background:var(--ac);color:var(--bg)}
.key-test{background:var(--acl);color:var(--ac);border:1px solid var(--bd)}
.key-status{font-size:11px;margin-top:4px;min-height:16px}
.key-ok{color:#5cb85c}.key-err{color:#e74c3c}.key-wait{color:var(--ac)}
.key-hint{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.4}
.key-hint a{color:var(--ac)}
</style>
</head>
<body data-th="dark">
<audio id="aud" preload="auto"></audio>
<div class="bar"><div class="bar-in">

    <button class="ib" id="bSetBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>

</div><div class="top-prg"><div class="top-fill" id="tF"></div></div></div>

<script>
(function(){
"use strict";
/* ══════ STATE ══════ */
var BK=[], PI=[], CH=[], RI=[];
var playing=false, curIdx=-1, spd=1, smartMode=true, showPdfSync=false, fontSize=18;
var gKey='', voiceName='en-US-Neural2-D';
var bookmarks=new Set();
var audioCache={}, playlist=[], plPos=-1, chDurs=[];
var AUD, scDrag=false;
var SP=[0.75,1,1.25,1.5,2];
var VOICES=['en-US-Neural2-D','en-US-Neural2-A','en-US-Neural2-C','en-US-Neural2-F','en-US-Neural2-H','en-US-Neural2-I','en-GB-Neural2-A','en-GB-Neural2-B','en-GB-Neural2-C','en-GB-Neural2-D','en-US-Standard-A','en-US-Standard-D','en-US-Standard-F','en-GB-Standard-A','en-GB-Standard-B'];

/* ══════ PERSIST ══════ */
function trySave(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function tryLoad(k){try{return localStorage.getItem(k);}catch(e){return null;}}

/* ══════ PDF EXTRACT ══════ */
function exPDF(file){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  return file.arrayBuffer().then(function(buf){return pdfjsLib.getDocument({data:buf}).promise;})
  .then(function(pdf){
    var pgs=[],raw=[],chain=Promise.resolve();
    for(var p=1;p<=pdf.numPages;p++)(function(pn){
      chain=chain.then(function(){return pdf.getPage(pn).then(function(pg){
        var vp=pg.getViewport({scale:1.5}),cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
        return pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise.then(function(){pgs.push(cv.toDataURL('image/jpeg',.8));return pg.getTextContent();})
        .then(function(tc){
          var ph=pg.view[3],lns=[],cl=[],ly=null;
          tc.items.forEach(function(it){if(!it.str)return;var y=Math.round(it.transform[5]),h=it.height||it.transform[0];
            if(ly!==null&&Math.abs(y-ly)>h*.5){if(cl.length)lns.push(cl.slice());cl=[];}
            cl.push({s:it.str,x:it.transform[4],w:it.width,h:h,y:y});ly=y;});
          if(cl.length)lns.push(cl.slice());
          lns.forEach(function(ln){ln.sort(function(a,b){return a.x-b.x;});var tx='',pe=0;
            for(var i=0;i<ln.length;i++){var it=ln[i],g=it.x-pe,cw=it.w/Math.max(it.s.length,1);if(i>0&&g>cw*.3)tx+=' ';tx+=it.s;pe=it.x+it.w;}
            var tr=tx.trim();if(!tr||tr.length<2)return;var tp='text';
            if(ln[0].y>ph*.88)tp='header';else if(ln[0].y<ph*.07)tp='footer';else if(ln[0].h>15&&tr.length<100)tp='heading';
            raw.push({type:tp,text:tr,page:pn});});});});});
    })(p);
    return chain.then(function(){
      var mg=[],bf='',bp=1;
      raw.forEach(function(b){if(b.type==='header'||b.type==='footer'){if(bf.trim())mg.push({type:'paragraph',text:bf.trim(),page:bp});bf='';mg.push(b);return;}
        if(b.type==='heading'){if(bf.trim())mg.push({type:'paragraph',text:bf.trim(),page:bp});bf='';mg.push({type:'chapter',text:b.text,page:b.page});return;}
        if(bf.endsWith('-'))bf=bf.slice(0,-1)+b.text;
        else if(bf&&!/[.!?":;]$/.test(bf))bf+=' '+b.text;
        else{if(bf.trim())mg.push({type:'paragraph',text:bf.trim(),page:bp});bf=b.text;bp=b.page;}});
      if(bf.trim())mg.push({type:'paragraph',text:bf.trim(),page:bp});
      var cleaned=mg.filter(function(b){return b.text.length>3;}).map(function(b){
        if(b.type!=='paragraph')return b;
        var t=b.text.replace(/(\w)\s(tion|sion|ment|ness|ing|ous|ive|ful|less|ence|ance|ity)\b/gi,'$1$2')
          .replace(/\b(in|un|re|pre|dis|mis)\s(\w{3,})/gi,'$1$2').replace(/\s{2,}/g,' ').trim();
        return{type:b.type,text:t,page:b.page};});
      return{blocks:cleaned,pages:pgs};});});}

/* ══════ GOOGLE TTS ══════ */
function callTTS(text){
  var url='https://texttospeech.googleapis.com/v1/text:synthesize?key='+gKey;
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({input:{text:text},voice:{languageCode:voiceName.slice(0,5),name:voiceName},audioConfig:{audioEncoding:'MP3',speakingRate:1.0,pitch:0}})})
  .then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error?e.error.message:'HTTP '+r.status);});
    return r.json();})
  .then(function(d){
    var bin=atob(d.audioContent),buf=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([buf],{type:'audio/mpeg'}));});}

function testKey(){
  var st=document.getElementById('keyStatus');
  if(!gKey){st.className='key-status key-err';st.textContent='No key entered';return;}
  st.className='key-status key-wait';st.textContent='Testing...';
  callTTS('Hello, VoxReader is working.').then(function(url){
    st.className='key-status key-ok';st.textContent='✓ Connected! Voice is working.';
    var a=new Audio(url);a.play().catch(function(){});
  }).catch(function(e){
    st.className='key-status key-err';st.textContent='✗ Error: '+e.message;
  });}

function genChapter(ci,cb){
  var ch=CH[ci];if(!ch)return Promise.resolve();
  var paras=[];
  for(var r=ch.sr;r<=ch.er;r++){var idx=RI[r];if(BK[idx].type==='paragraph')paras.push(idx);}
  var done=0,chain=Promise.resolve();
  paras.forEach(function(idx){
    chain=chain.then(function(){
      if(audioCache[idx]){done++;if(cb)cb(done,paras.length);return;}
      return callTTS(BK[idx].text).then(function(url){
        return new Promise(function(res){var a=new Audio(url);
          a.addEventListener('loadedmetadata',function(){audioCache[idx]={url:url,dur:a.duration};res();});
          a.addEventListener('error',function(){audioCache[idx]={url:null,dur:0};res();});});
      }).catch(function(e){console.error('TTS:',e);audioCache[idx]={url:null,dur:0};})
      .then(function(){done++;if(cb)cb(done,paras.length);});});});
  return chain.then(function(){var td=0;for(var r=ch.sr;r<=ch.er;r++){var c=audioCache[RI[r]];if(c)td+=c.dur;}chDurs[ci]=td;});}

/* ══════ COMPUTE ══════ */
function compute(){
  RI=[];BK.forEach(function(b,i){if(smartMode){if(b.type==='paragraph'||b.type==='chapter')RI.push(i);}else{if(b.type!=='header'&&b.type!=='footer')RI.push(i);}});
  CH=[];var c={t:'Start',sr:0,si:RI[0]||0};
  RI.forEach(function(idx,ri){if(BK[idx].type==='chapter'){if(ri>0){c.er=ri-1;CH.push(c);}c={t:BK[idx].text,sr:ri,si:idx};}});
  c.er=RI.length-1;CH.push(c);chDurs=CH.map(function(){return 0;});}

function getCurCh(){if(curIdx<0)return 0;for(var i=CH.length-1;i>=0;i--)if(curIdx>=CH[i].si)return i;return 0;}
function getChOf(idx){for(var i=CH.length-1;i>=0;i--)if(idx>=CH[i].si)return i;return 0;}
function fmt(s){s=Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function chElapsed(ci){var ch=CH[ci],s=0,cri=RI.indexOf(curIdx);
  for(var r=ch.sr;r<=ch.er;r++){if(r<cri){var ac=audioCache[RI[r]];if(ac)s+=ac.dur;}else if(r===cri){s+=(AUD.currentTime||0);break;}}return s;}

/* ══════ PLAYBACK ══════ */
function buildPL(ci){var ch=CH[ci];playlist=[];
  for(var r=ch.sr;r<=ch.er;r++){var idx=RI[r];if(BK[idx].type==='paragraph'&&audioCache[idx]&&audioCache[idx].url)playlist.push(idx);}return playlist;}

function playFrom(idx){
  var ci=getChOf(idx);
  if(!audioCache[idx]||!audioCache[idx].url){showGen(ci);
    return genChapter(ci,updGen).then(function(){hideGen();var pl=buildPL(ci);plPos=pl.indexOf(idx);if(plPos<0)plPos=0;playing=true;playSeg(pl[plPos]);
      if(ci+1<CH.length)genChapter(ci+1).catch(function(){});});}
  var pl=buildPL(ci);plPos=pl.indexOf(idx);if(plPos<0)plPos=0;playing=true;playSeg(pl[plPos]);return Promise.resolve();}

function playSeg(idx){curIdx=idx;var c=audioCache[idx];if(!c||!c.url){nextSeg();return;}
  AUD.src=c.url;AUD.playbackRate=spd;AUD.play().catch(function(e){console.log('play:',e);});
  hlPara(idx);syncPdf(idx);setupMS();updatePlayer();}

function nextSeg(){plPos++;
  if(plPos<playlist.length)setTimeout(function(){playSeg(playlist[plPos]);},200);
  else{var ci=getCurCh();if(ci+1<CH.length)setTimeout(function(){playCh(ci+1);},600);else{playing=false;updateBtns();}}}

function playCh(ci){
  var firstIdx=RI[CH[ci].sr];
  if(!audioCache[firstIdx]||!audioCache[firstIdx].url){showGen(ci);
    return genChapter(ci,updGen).then(function(){hideGen();var pl=buildPL(ci);if(!pl.length){playing=false;updateBtns();return;}
      plPos=0;playlist=pl;playSeg(pl[0]);if(ci+1<CH.length)genChapter(ci+1).catch(function(){});});}
  var pl=buildPL(ci);if(!pl.length){playing=false;updateBtns();return;}
  plPos=0;playlist=pl;playSeg(pl[0]);if(ci+1<CH.length)genChapter(ci+1).catch(function(){});}

function stopPlay(){AUD.pause();playing=false;updateBtns();}
function hlPara(idx){document.querySelectorAll('.bp.act,.bc.act').forEach(function(e){e.classList.remove('act');});
  var el=document.getElementById('b'+idx);if(el){el.classList.add('act');el.scrollIntoView({behavior:'smooth',block:'center'});}}
function syncPdf(idx){if(!showPdfSync||!PI.length)return;var pg=BK[idx]?BK[idx].page:null;if(!pg)return;
  var el=document.getElementById('pdfSync');if(el)el.innerHTML='<img src="'+PI[pg-1]+'"><div style="font-size:11px;color:var(--t2);margin-top:4px">Page '+pg+'</div>';}

function showGen(ci){var el=document.getElementById('genBar');
  if(!el){el=document.createElement('div');el.id='genBar';el.className='gen-bar';document.getElementById('ct').prepend(el);}
  el.innerHTML='<div class="gen-info"><span>Generating: '+(CH[ci]?CH[ci].t:'Chapter')+'</span><span id="genPct">0%</span></div><div class="gen-track"><div class="gen-fill" id="genFill"></div></div>';el.style.display='';}
function updGen(d,t){var el=document.getElementById('genFill');if(el)el.style.width=Math.round(d/t*100)+'%';var p=document.getElementById('genPct');if(p)p.textContent=Math.round(d/t*100)+'%';}
function hideGen(){var el=document.getElementById('genBar');if(el)el.style.display='none';}

/* ══════ MEDIA SESSION ══════ */
function setupMS(){if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({title:CH[getCurCh()]?CH[getCurCh()].t:'VoxReader',artist:'VoxReader',album:document.getElementById('fn').textContent||'Book'});
  navigator.mediaSession.setActionHandler('play',function(){AUD.play();playing=true;updateBtns();});
  navigator.mediaSession.setActionHandler('pause',function(){AUD.pause();playing=false;updateBtns();});
  navigator.mediaSession.setActionHandler('previoustrack',function(){var c=getCurCh();if(c>0)playCh(c-1);});
  navigator.mediaSession.setActionHandler('nexttrack',function(){var c=getCurCh();if(c+1<CH.length)playCh(c+1);});}

/* ══════ PLAYER UI ══════ */
function updatePlayer(){var ci=getCurCh(),ce=chElapsed(ci),ct=chDurs[ci]||1,cr=ct-ce;
  document.getElementById('sEl').textContent=fmt(ce);document.getElementById('sRe').textContent='-'+fmt(cr);
  document.getElementById('sFl').style.width=Math.min(100,ce/ct*100)+'%';
  document.getElementById('pCh').textContent=curIdx>=0?'Ch '+(ci+1)+': '+(CH[ci]?CH[ci].t:''):(gKey?'Tap a paragraph':'Add TTS key above');
  var bE=0,bT=0;chDurs.forEach(function(d,i){bT+=d;if(i<ci)bE+=d;});bE+=ce;var bp=bT?Math.round(bE/bT*100):0;
  document.getElementById('pBk').textContent=curIdx>=0?bp+'% · '+fmt(bT-bE)+' left':'';
  document.getElementById('tF').style.width=bp+'%';var pt=document.getElementById('bPt');if(pt)pt.textContent=bp+'%';
  renderCh();updateBtns();}

function updateBtns(){document.getElementById('pIc').innerHTML=playing?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
  var a=curIdx>=0;['xRw','xFw','xPC','xNC'].forEach(function(id){document.getElementById(id).disabled=!a;});}

/* scrubber */
function scrubSeek(e){var trk=document.getElementById('sTk'),rect=trk.getBoundingClientRect();
  var cx=e.clientX||(e.touches?e.touches[0].clientX:0);var pct=Math.max(0,Math.min(1,(cx-rect.left)/rect.width));
  var ci=getCurCh(),tgt=pct*(chDurs[ci]||1),acc=0;
  for(var ri=CH[ci].sr;ri<=CH[ci].er;ri++){var idx=RI[ri],c=audioCache[idx];if(!c)continue;
    if(acc+c.dur>=tgt){playlist=buildPL(ci);plPos=playlist.indexOf(idx);curIdx=idx;
      AUD.src=c.url;AUD.currentTime=tgt-acc;AUD.playbackRate=spd;AUD.play().catch(function(){});playing=true;hlPara(idx);updatePlayer();return;}
    acc+=c.dur;}}

/* ══════ RENDER ══════ */
function renderContent(){compute();var a=document.getElementById('ct');
  var tw=0;RI.forEach(function(i){tw+=BK[i].text.split(/\s+/).length;});
  var h='<div id="pdfSync" class="pdf-sync" style="display:'+(showPdfSync?'':'none')+'"></div>';
  // key box if no key
  if(!gKey){
    h+='<div class="key-box"><h3>🔑 Google Cloud TTS Setup</h3>';
    h+='<div class="key-row"><input class="key-input" id="keyInput" placeholder="Paste your API key here (AIza...)"><button class="key-btn key-save" onclick="saveKeyFromInput()">Save</button><button class="key-btn key-test" onclick="testKey()">Test</button></div>';
    h+='<div class="key-status" id="keyStatus"></div>';
    h+='<div class="key-hint">Get a free key: <a href="https://console.cloud.google.com/apis/credentials" target="_blank">Google Cloud Console</a> → Create Credentials → API Key<br>Free tier: 4M chars/month (Standard), 1M chars/month (Neural2)</div></div>';
  } else {
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;padding:6px 10px;border-radius:8px;background:var(--acl);font-size:11px">';
    h+='<span style="color:#5cb85c">✓ TTS key active</span><span style="color:var(--t2)">'+voiceName+'</span>';
    h+='<button style="margin-left:auto;background:none;border:1px solid var(--bd);border-radius:6px;padding:2px 8px;color:var(--t2);cursor:pointer;font-size:10px;font-family:var(--fu)" onclick="clearKey()">Change key</button></div>';
  }
  h+='<div style="display:flex;justify-content:space-between;padding:8px 11px;border-radius:9px;background:var(--acl);border:1px solid var(--bd);font-size:12px;color:var(--t2);margin-bottom:16px">';
  h+='<span>~'+Math.ceil(tw/150)+' min · '+CH.length+' chapters</span><span style="font-weight:600;color:var(--ac)" id="bPt">0%</span></div>';
  BK.forEach(function(b,i){
    var sk=smartMode&&(b.type==='header'||b.type==='footer');
    if(sk){h+='<div class="bsk" id="b'+i+'">⚡ '+b.text.slice(0,45)+'</div>';return;}
    if(b.type==='chapter'){h+='<div class="bc" id="b'+i+'" onclick="window._tap('+i+')"><h2>'+b.text+'</h2></div>';return;}
    var bc=bookmarks.has(i)?' has':'';
    h+='<div class="bp" id="b'+i+'" onclick="window._tap('+i+')"><p>'+b.text+'</p>';
    h+='<button class="bmb'+bc+'" onclick="event.stopPropagation();window._bm('+i+')">';
    h+='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg></button></div>';
  });
  a.innerHTML=h;renderCh();updatePlayer();}

function renderCh(){var l=document.getElementById('cL');if(!l)return;var ci=getCurCh(),h='';
  CH.forEach(function(ch,i){var d=chDurs[i]||0,p=d?Math.round(chElapsed(i)/d*100):0;
    h+='<button class="chi'+(i===ci?' cur':'')+'" onclick="window._jc('+i+')">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="nm">'+ch.t+'</span><span style="font-size:10px;color:var(--t2)">'+(d?fmt(d):'—')+'</span></div>';
    h+='<div style="display:flex;align-items:center;gap:6px"><div class="cbar"><div class="cfill" style="width:'+p+'%"></div></div><span class="cpct">'+p+'%</span>';
    if(i===ci&&playing)h+='<span class="cdot"></span>';h+='</div></button>';});
  l.innerHTML=h;}

function renderBm(){document.getElementById('bN').textContent=bookmarks.size;document.getElementById('bDot').style.display=bookmarks.size?'':'none';
  var l=document.getElementById('bL');
  if(!bookmarks.size){l.innerHTML='<div style="font-size:12px;color:var(--t2)">Tap bookmark icon on any paragraph</div>';return;}
  var h='';Array.from(bookmarks).sort(function(a,b){return a-b;}).forEach(function(i){
    h+='<button class="chi" onclick="window._tap('+i+');window._cp()">★ '+(BK[i]?BK[i].text.slice(0,65):'')+'…</button>';});
  l.innerHTML=h;}

function renderSettings(){
  var voiceOpts=VOICES.map(function(v){return'<option value="'+v+'"'+(v===voiceName?' selected':'')+'>'+v+'</option>';}).join('');
  var thm=document.body.dataset.th||'dark';
  var h='';
  h+='<div class="sr"><span class="sl">KEY</span><input class="key-input" style="flex:1;padding:4px 8px;font-size:11px" value="'+gKey+'" oninput="window._uk(this.value)" placeholder="Google TTS API key"><button class="key-btn key-test" style="padding:4px 10px;font-size:10px" onclick="testKey()">Test</button></div>';
  h+='<div class="sr"><span class="sl">VOICE</span><select onchange="window._uv(this.value)" style="flex:1;max-width:200px">'+voiceOpts+'</select></div>';
  h+='<div class="sr"><span class="sl">THEME</span>';
  ['dark','light','sepia'].forEach(function(t){h+='<button class="pill'+(t===thm?' on':'')+'" onclick="window._st(\''+t+'\')">'+t+'</button>';});h+='</div>';
  h+='<div class="sr"><span class="sl">SIZE</span><button class="pill" onclick="window._cfs(-1)">−</button><span style="min-width:22px;text-align:center;font-size:13px" id="fV">'+fontSize+'</span><button class="pill" onclick="window._cfs(1)">+</button></div>';
  h+='<div class="sr"><span class="sl">SMART</span><button class="pill'+(smartMode?' on':'')+'" onclick="window._tsm()">'+(smartMode?'ON — Skip junk':'OFF — All')+'</button></div>';
  h+='<div class="sr"><span class="sl">PDF</span><button class="pill'+(showPdfSync?' on':'')+'" onclick="window._tps()">'+(showPdfSync?'ON — Show page':'OFF')+'</button></div>';
  document.getElementById('setBox').innerHTML=h;}

function loadDemo(){PI=[];audioCache={};document.getElementById('bPg').style.display='none';document.getElementById('fn').textContent='Demo Book';
  BK=[{type:'chapter',text:'Chapter 1: The Beginning'},{type:'paragraph',text:'In the quiet hours before dawn, when the world still held its breath between darkness and light, Marcus found himself standing at the edge of something vast and unknowable.'},{type:'paragraph',text:'He had always been a reader — not just of books, but of silences, of the spaces between words where meaning truly lived. His grandmother had taught him that.'},{type:'header',text:'Page 12 — Draft Copy'},{type:'paragraph',text:'The morning light crept across the rooftops like spilled honey, transforming the grey concrete into something almost beautiful.'},{type:'paragraph',text:'He thought about the letter in his pocket. Three pages of careful handwriting, each word chosen with the precision of a surgeon.'},{type:'footer',text:'© 2024 All Rights Reserved'},{type:'paragraph',text:'There is a particular kind of courage required to sit with grief without trying to fix it. Marcus had learned this the hard way.'},{type:'chapter',text:'Chapter 2: The Library'},{type:'paragraph',text:'The old library on Adeniyi Jones Avenue had survived three floods, two attempted demolitions, and the slow march of digital transformation.'},{type:'paragraph',text:'Marcus pushed open the heavy wooden door and stepped inside. The air was different here — cooler, quieter, thick with wisdom.'},{type:'paragraph',text:'"You\'re back," she said, as if he had only stepped out for a moment. "I kept your books on hold."'},{type:'paragraph',text:'Mrs. Adeyemi brought him tea without being asked. It was the small kindnesses that undid him.'},{type:'chapter',text:'Chapter 3: Everything Changed'},{type:'paragraph',text:'The letter was still in his pocket. He could feel its edges pressing against his thigh, a constant reminder.'},{type:'paragraph',text:'His mother had written about forgiveness — not the grand theatrical kind, but the quiet daily practice of releasing what you cannot change.'},{type:'paragraph',text:'When he finished reading, Marcus folded the letter. It was no longer a burden — it was a compass.'}];
  renderContent();}

/* ══════ PANEL TOGGLES ══════ */
function closePanel(){document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('open');});
  ['bSetBtn','bChBtn','bBmBtn','bPg'].forEach(function(id){var b=document.getElementById(id);if(b)b.classList.remove('on');});}
function togglePanel(pnlId,btnId){var pnl=document.getElementById(pnlId),open=pnl.classList.contains('open');closePanel();
  if(!open){pnl.classList.add('open');document.getElementById(btnId).classList.add('on');
    if(pnlId==='pnlBm')renderBm();if(pnlId==='pnlSet')renderSettings();}}

/* ══════ GLOBAL HANDLERS ══════ */
window._tap=function(i){if(!gKey){alert('Please add your Google Cloud TTS API key first.\n\nPaste it in the box at the top of the page, then click Save.');return;}stopPlay();playFrom(i);};
window._bm=function(i){if(bookmarks.has(i))bookmarks.delete(i);else bookmarks.add(i);
  var btn=document.querySelector('#b'+i+' .bmb');if(btn)btn.classList.toggle('has',bookmarks.has(i));
  document.getElementById('bDot').style.display=bookmarks.size?'':'none';trySave('vox_bm',JSON.stringify(Array.from(bookmarks)));renderBm();};
window._jc=function(ci){closePanel();playCh(ci);};
window._cp=closePanel;
window._uk=function(v){gKey=v;trySave('vox_key',v);};
window._uv=function(v){voiceName=v;trySave('vox_voice',v);};
window._st=function(t){document.body.dataset.th=t;renderSettings();};
window._cfs=function(d){fontSize=Math.max(14,Math.min(28,fontSize+d));document.documentElement.style.setProperty('--fs',fontSize+'px');renderSettings();};
window._tsm=function(){smartMode=!smartMode;if(BK.length)renderContent();else renderSettings();};
window._tps=function(){showPdfSync=!showPdfSync;var el=document.getElementById('pdfSync');if(el)el.style.display=showPdfSync?'':'none';renderSettings();};

window.saveKeyFromInput=function(){var inp=document.getElementById('keyInput');if(!inp)return;
  gKey=inp.value.trim();trySave('vox_key',gKey);
  var st=document.getElementById('keyStatus');
  if(gKey){st.className='key-status key-ok';st.textContent='✓ Key saved! Click Test to verify, or tap a paragraph to start.';if(BK.length)renderContent();}
  else{st.className='key-status key-err';st.textContent='Please enter a key';}};
window.testKey=function(){testKey();};
window.clearKey=function(){gKey='';trySave('vox_key','');renderContent();};
window.loadDemo=loadDemo;

/* ══════ INIT ══════ */
document.addEventListener('DOMContentLoaded',function(){
  AUD=document.getElementById('aud');
  AUD.addEventListener('timeupdate',function(){if(playing)updatePlayer();});
  AUD.addEventListener('ended',function(){nextSeg();});

  // load saved
  var sk=tryLoad('vox_key');if(sk)gKey=sk;
  var sv=tryLoad('vox_voice');if(sv)voiceName=sv;
  var sb=tryLoad('vox_bm');if(sb)try{bookmarks=new Set(JSON.parse(sb));}catch(e){}

  // scrubber
  var sTk=document.getElementById('sTk');
  sTk.addEventListener('mousedown',function(e){scDrag=true;scrubSeek(e);});
  sTk.addEventListener('touchstart',function(e){scDrag=true;scrubSeek(e);},{passive:true});
  document.addEventListener('mousemove',function(e){if(scDrag)scrubSeek(e);});
  document.addEventListener('touchmove',function(e){if(scDrag)scrubSeek(e);},{passive:true});
  document.addEventListener('mouseup',function(){scDrag=false;});
  document.addEventListener('touchend',function(){scDrag=false;});

  // player buttons
  document.getElementById('xPl').addEventListener('click',function(){
    if(playing)stopPlay();
    else{if(!gKey){alert('Add your TTS key first (paste in the box at the top)');return;}playFrom(curIdx>=0?curIdx:RI[0]);}});
  document.getElementById('xFw').addEventListener('click',function(){AUD.currentTime=Math.min(AUD.duration||0,AUD.currentTime+10);});
  document.getElementById('xRw').addEventListener('click',function(){AUD.currentTime=Math.max(0,AUD.currentTime-10);});
  document.getElementById('xNC').addEventListener('click',function(){var c=getCurCh();if(c+1<CH.length)playCh(c+1);});
  document.getElementById('xPC').addEventListener('click',function(){var c=getCurCh();if(c>0)playCh(c-1);});
  document.getElementById('xSp').addEventListener('click',function(){var i=SP.indexOf(spd);spd=SP[(i+1)%SP.length];AUD.playbackRate=spd;document.getElementById('xSp').textContent=spd+'x';});

  // panels
  document.getElementById('bSetBtn').addEventListener('click',function(){togglePanel('pnlSet','bSetBtn');});
  document.getElementById('bChBtn').addEventListener('click',function(){togglePanel('pnlCh','bChBtn');});
  document.getElementById('bBmBtn').addEventListener('click',function(){togglePanel('pnlBm','bBmBtn');});
  document.getElementById('bPg').addEventListener('click',function(){showPdfSync=!showPdfSync;document.getElementById('bPg').classList.toggle('on',showPdfSync);
    var el=document.getElementById('pdfSync');if(el)el.style.display=showPdfSync?'':'none';});

  // file
  document.getElementById('fIn').addEventListener('change',function(e){
    var f=e.target.files[0];if(!f)return;document.getElementById('fn').textContent=f.name;stopPlay();curIdx=-1;audioCache={};
    document.getElementById('ct').innerHTML='<div style="text-align:center;padding:50px;color:var(--t2)"><div class="spinner"></div><div style="font-size:14px">Reading PDF…</div></div>';
    exPDF(f).then(function(r){PI=r.pages;BK=r.blocks;document.getElementById('bPg').style.display=PI.length?'':'none';renderContent();})
    .catch(function(err){console.error(err);document.getElementById('ct').innerHTML='<div style="text-align:center;padding:50px"><div style="font-size:16px;color:var(--ac);margin-bottom:8px">Could not read PDF</div><div style="font-size:13px;color:var(--t2)">Error: '+err.message+'</div></div>';});});

  // show welcome
  document.getElementById('ct').innerHTML='<div style="text-align:center;padding:50px 16px"><div style="width:68px;height:68px;border-radius:18px;background:var(--acl);display:flex;align-items:center;justify-content:center;margin:0 auto 14px"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--ac)" stroke-width="1.5"><path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg></div><div style="font-size:19px;font-weight:600;margin-bottom:5px;font-family:var(--fb)">VoxReader</div><div style="font-size:13px;color:var(--t2);max-width:360px;margin:0 auto 18px;line-height:1.5">Upload a PDF, add your Google Cloud TTS key, and enjoy real background audio with lock screen controls.</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><label class="bo"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Upload PDF<input type="file" accept=".pdf" style="display:none" onchange="document.getElementById(\'fIn\').files=this.files;document.getElementById(\'fIn\').dispatchEvent(new Event(\'change\'))"></label><button class="bf" onclick="loadDemo()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Demo</button></div></div>';
});
})();
</script>
