<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F0F14">
<title>VoxReader</title>
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,600&family=Lora:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--bg:#0F0F14;--s:#181820;--t:#E4E0D7;--t2:#6E6A62;--t3:#3E3B36;--ac:#D08C30;--acl:rgba(208,140,48,.1);--acg:rgba(208,140,48,.25);--hl:rgba(208,140,48,.14);--hla:rgba(208,140,48,.3);--bd:rgba(255,255,255,.05);--sh:rgba(0,0,0,.5);--gl:rgba(15,15,20,.96);--ch:#D08C30;--pb:#252530;--fb:'Literata',serif;--fu:'DM Sans',sans-serif;--fs:18px;--lh:1.8}
[data-th=light]{--bg:#F7F5EE;--s:#FFF;--t:#2A2722;--t2:#8A8478;--t3:#C5BFB5;--ac:#B0621E;--acl:rgba(176,98,30,.08);--acg:rgba(176,98,30,.2);--hl:rgba(255,200,60,.28);--hla:rgba(255,180,60,.42);--bd:rgba(0,0,0,.06);--sh:rgba(0,0,0,.04);--gl:rgba(247,245,238,.95);--ch:#7A4518;--pb:#E6E2D8}
[data-th=sepia]{--bg:#E8DDCA;--s:#DED2BA;--t:#3E3020;--t2:#7A654A;--t3:#A08C6D;--ac:#7B3510;--acl:rgba(123,53,16,.08);--acg:rgba(123,53,16,.18);--hl:rgba(160,100,35,.18);--hla:rgba(160,100,35,.3);--bd:rgba(62,48,32,.08);--sh:rgba(62,48,32,.06);--gl:rgba(232,221,202,.95);--ch:#5A2D0C;--pb:#CCC0A6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t);font-family:var(--fu);min-height:100dvh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

.bar{position:sticky;top:0;z-index:100;background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:8px 14px}
.bar-in{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:17px;font-weight:700;color:var(--ac);font-family:var(--fb);letter-spacing:-.4px}
.fname{font-size:10px;color:var(--t2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:6px}
.btns{display:flex;gap:1px}
.ib{background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--t2);display:flex;align-items:center}
.ib.on{background:var(--acl);color:var(--ac)}
.ub{cursor:pointer;padding:5px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--acl);border:1px solid var(--bd);color:var(--t2);font-family:var(--fu)}
.ub input{display:none}
.top-prg{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--bd)}
.top-fill{height:100%;background:var(--ac);transition:width .4s;border-radius:2px}

.pnl{display:none;position:sticky;top:47px;z-index:90;background:var(--s);border-bottom:1px solid var(--bd);padding:12px 14px;animation:sd .2s}
.pnl.open{display:block}
.pnl-in{max-width:780px;margin:0 auto}
.pnl-t{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
@keyframes sd{from{opacity:0;transform:translateY(-6px)}}
.pill{padding:4px 11px;border-radius:14px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--fu)}
.pill.on{border-color:var(--ac);background:var(--acl);color:var(--ac)}
.sr{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.sl{font-size:10px;font-weight:700;color:var(--t2);min-width:42px;letter-spacing:.3px}
select{padding:3px 7px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--t);font-size:12px;font-family:var(--fu);outline:none}
input[type=range]{accent-color:var(--ac);height:3px;min-width:40px}
input[type=text]{padding:4px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--t);font-size:11px;font-family:var(--fu);outline:none;width:100%;max-width:260px}

/* chapter list */
.chi{display:block;width:100%;text-align:left;padding:9px 11px;border-radius:8px;border:none;background:transparent;cursor:pointer;margin-bottom:2px;font-family:var(--fu);color:var(--t)}
.chi:hover,.chi.cur{background:var(--acl)}
.chi .nm{font-size:13px;font-family:var(--fb)}.chi.cur .nm{font-weight:600;color:var(--ac)}
.chi .dr{font-size:10px;color:var(--t2)}
.cbar{flex:1;height:3px;border-radius:2px;background:var(--pb);overflow:hidden}
.cfill{height:100%;border-radius:2px;background:var(--t2);transition:width .3s}
.chi.cur .cfill{background:var(--ac)}
.cpct{font-size:10px;color:var(--t2);min-width:26px;text-align:right}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--ac);animation:pls 1s infinite;flex-shrink:0}
@keyframes pls{0%,100%{opacity:.4}50%{opacity:1}}@keyframes spn{to{transform:rotate(360deg)}}

/* content */
.cnt{max-width:700px;margin:0 auto;padding:20px 16px 270px}
.sts{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;margin-bottom:16px;padding:8px 11px;border-radius:9px;background:var(--acl);border:1px solid var(--bd);font-size:12px;color:var(--t2)}
.bp{position:relative;padding:8px 12px;margin:2px 0;border-radius:6px;border-left:3px solid transparent;cursor:pointer;transition:all .25s}
.bp:hover{background:var(--hl)}
.bp.act{background:var(--hla);border-left-color:var(--ac);box-shadow:0 2px 8px var(--sh)}
.bp p{font-size:var(--fs);line-height:var(--lh);font-family:var(--fb);margin:0}
.bc{margin:30px 0 12px;padding:10px 0;border-bottom:2px solid var(--ac);cursor:pointer}
.bc.act{background:var(--hla);border-radius:6px;padding-left:10px}
.bc h2{font-size:calc(var(--fs) + 4px);font-weight:600;font-family:var(--fb);color:var(--ch);margin:0}
.bsk{padding:3px 9px;margin:2px 0;border-radius:4px;background:rgba(255,82,82,.05);border:1px dashed rgba(255,82,82,.12);font-size:10px;color:var(--t2);opacity:.5;font-style:italic}
.bmb{position:absolute;top:5px;right:3px;background:none;border:none;cursor:pointer;padding:2px;color:var(--bd);opacity:0;transition:opacity .15s}
.bp:hover .bmb{opacity:.5}.bmb:hover{opacity:1!important}.bmb.has{opacity:1!important;color:var(--ac)}
@media(max-width:480px){.bmb{opacity:.25}.bmb.has{opacity:1}.fname{display:none}}

/* PLAYER */
.player{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--gl);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);box-shadow:0 -4px 20px var(--sh);padding:0 14px;padding-bottom:max(6px,env(safe-area-inset-bottom))}
.pl-in{max-width:780px;margin:0 auto}

/* chapter label + book progress */
.pl-top{display:flex;justify-content:space-between;align-items:center;padding:7px 0 0;font-size:11px}
.pl-ch{color:var(--ac);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pl-bk{color:var(--t2);flex-shrink:0;margin-left:8px}

/* scrubber = CURRENT CHAPTER */
.sc-wrap{display:flex;align-items:center;gap:7px;padding:5px 0 2px}
.sc-t{font-size:10px;color:var(--t2);font-weight:500;min-width:32px;font-variant-numeric:tabular-nums}
.sc-t.r{text-align:right}
.sc-trk{flex:1;position:relative;height:28px;display:flex;align-items:center;cursor:pointer;touch-action:none}
.sc-rail{width:100%;height:3px;border-radius:2px;background:var(--pb)}
.sc-fl{height:100%;border-radius:2px;background:var(--ac);position:relative;transition:width .12s}
.sc-th{position:absolute;right:-8px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:var(--ac);box-shadow:0 2px 8px var(--acg)}
.sc-trk:active .sc-th{transform:translateY(-50%) scale(1.3)}

/* controls */
.pl-ct{display:flex;align-items:center;justify-content:center;gap:2px;padding:2px 0 5px}
.cb{background:none;border:none;cursor:pointer;color:var(--t);padding:5px;display:flex;align-items:center}
.cb:disabled{color:var(--t3);cursor:default}
.cb svg{width:22px;height:22px}
.pb{width:54px;height:54px;border-radius:50%;background:var(--ac);border:none;cursor:pointer;color:var(--bg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px var(--acg);margin:0 6px}
.pb:active{transform:scale(.9)}
.pb svg{width:26px;height:26px}
.skb{position:relative;padding:5px;background:none;border:none;cursor:pointer;color:var(--t);display:flex;align-items:center}
.skb:disabled{color:var(--t3)}.skb svg{width:28px;height:28px}
.skb span{position:absolute;font-size:8px;font-weight:700;top:50%;left:50%;transform:translate(-50%,-50%);margin-top:1px}
.spc{background:var(--acl);border:1px solid var(--bd);border-radius:12px;padding:3px 8px;cursor:pointer;color:var(--ac);font-size:11px;font-weight:700;min-width:32px;text-align:center;font-family:var(--fu);margin-left:4px}

/* ── ADDED: voice preview button ── */
.vprev{padding:4px 10px;border-radius:14px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--fu);white-space:nowrap}
.vprev:hover{border-color:var(--ac);color:var(--ac)}
/* ── ADDED: background status badge ── */
.bgst{font-size:9px;padding:2px 7px;border-radius:99px;font-weight:600;margin-left:4px}
.bgst.ok{background:rgba(90,158,111,.15);color:#5a9e6f;border:1px solid rgba(90,158,111,.3)}
.bgst.no{background:rgba(208,140,48,.1);color:var(--ac);border:1px solid var(--bd)}

.empty{text-align:center;padding:50px 16px}
.eic{width:68px;height:68px;border-radius:18px;background:var(--acl);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.et{font-size:19px;font-weight:600;margin-bottom:5px;font-family:var(--fb)}
.es{font-size:13px;color:var(--t2);max-width:330px;margin:0 auto 18px;line-height:1.5}
.ebt{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bo{display:inline-flex;align-items:center;gap:4px;padding:8px 18px;border-radius:20px;cursor:pointer;border:2px solid var(--ac);background:transparent;color:var(--ac);font-size:13px;font-weight:600;font-family:var(--fu)}
.bo input{display:none}
.bf{display:inline-flex;align-items:center;gap:4px;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;background:var(--ac);color:var(--bg);font-size:13px;font-weight:600;font-family:var(--fu);box-shadow:0 3px 14px var(--acg)}
.ai-s{font-size:9px;display:inline-flex;align-items:center;gap:3px;margin-left:6px}
.spinner{width:34px;height:34px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spn .7s linear infinite;margin:0 auto 12px}
.bdg{position:absolute;top:1px;right:1px;width:6px;height:6px;border-radius:50%;background:var(--ac)}
.pnl-scr{max-height:260px;overflow-y:auto}
</style>
</head>
<body data-th="dark">
<div class="bar"><div class="bar-in">
  <div style="display:flex;align-items:center"><span class="logo">VoxReader</span><span class="fname" id="fn"></span><span id="aiB"></span></div>

  </div>
</div><div class="top-prg"><div class="top-fill" id="tF"></div></div></div>

<script>
/* ══════════════ STATE ══════════════ */
let BK=[],PI=[],CH=[],RI=[];
let on=false,cur=-1,spd=1,sm=true,np=true,bm=new Set();
let VV=[],SV=null,fs=18,ff='Literata',th='dark',apiKey='';
const SP=[.5,.75,1,1.25,1.5,2,2.5,3];

/* ══════════════════════════════════════════════════════
   ADDED BLOCK 1 — BACKGROUND AUDIO KEEPALIVE
   Plays a near-silent looping audio buffer via Web Audio
   API. This registers the browser as an active audio
   player with the OS, preventing it from suspending
   the tab when you switch apps or lock the screen.
   Nothing in the original code is changed — this runs
   independently and starts on first play.
══════════════════════════════════════════════════════ */
let _bgCtx = null;
let _bgSrc  = null;
let _bgStarted = false;

function startBgAudio() {
  if (_bgStarted) return;
  try {
    _bgCtx = new (window.AudioContext || window.webkitAudioContext)();
    // 0.5 s silent buffer, looped — just enough to hold the audio session
    const buf = _bgCtx.createBuffer(1, Math.floor(_bgCtx.sampleRate * 0.5), _bgCtx.sampleRate);
    // samples are 0 by default → completely silent
    _bgSrc = _bgCtx.createBufferSource();
    _bgSrc.buffer = buf;
    _bgSrc.loop   = true;
    // tiny gain so some browsers don't optimise it away
    const gain = _bgCtx.createGain();
    gain.gain.value = 0.001;
    _bgSrc.connect(gain);
    gain.connect(_bgCtx.destination);
    _bgSrc.start(0);
    _bgStarted = true;
  } catch(e) { console.log('[BgAudio]', e); }
}

function stopBgAudio() {
  try { if (_bgSrc) { _bgSrc.stop(); _bgSrc = null; } } catch(e){}
  try { if (_bgCtx) { _bgCtx.close(); _bgCtx = null; } } catch(e){}
  _bgStarted = false;
}

/* ══════════════════════════════════════════════════════
   ADDED BLOCK 2 — MEDIA SESSION API
   Registers VoxReader as a proper media player with the
   phone's OS. This gives you:
     • Play/pause button on the lock screen
     • Next/previous chapter on lock screen & earbuds
     • The OS keeps the audio session alive longer
   Called each time a new paragraph starts speaking.
══════════════════════════════════════════════════════ */
function updateMediaSession(title) {
  if (!('mediaSession' in navigator)) return;
  const bookName = document.getElementById('fn').textContent || 'VoxReader';
  navigator.mediaSession.metadata = new MediaMetadata({
    title : title || bookName,
    artist: 'VoxReader',
    album : bookName,
  });
  navigator.mediaSession.playbackState = 'playing';

  // Lock-screen / earphone button handlers
  const safe = fn => { try { navigator.mediaSession.setActionHandler(fn[0], fn[1]); } catch(e){} };
  safe(['play',          () => { if (!on) strt(cur >= 0 ? cur : RI[0]); }]);
  safe(['pause',         () => { if (on)  stp(); }]);
  safe(['stop',          () => stp()]);
  safe(['nexttrack',     () => { const c = curCI(); if (c + 1 < CH.length) JC(c + 1); }]);
  safe(['previoustrack', () => { const c = curCI(); if (c > 0) JC(c - 1); }]);
  safe(['seekforward',   () => sk30(1)]);
  safe(['seekbackward',  () => sk30(-1)]);
}

function pauseMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = 'paused';
}

/* ══════════════════════════════════════════════════════
   ADDED BLOCK 3 — VOICE PREVIEW
   prvVoice() speaks a short sample sentence in the
   currently selected voice so the user can audition
   it before committing. Called from the settings panel.
══════════════════════════════════════════════════════ */
window.prvVoice = function() {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(
    'The morning light crept across the rooftops, and he felt something inside him begin to loosen.'
  );
  u.rate  = spd;
  u.pitch = 1.05;
  if (SV) u.voice = SV;
  speechSynthesis.speak(u);
};

/* ══════════════ PDF EXTRACT ══════════════ */
async function exPDF(f){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const pdf=await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise;
  const pgs=[],raw=[];
  for(let p=1;p<=pdf.numPages;p++){
    const pg=await pdf.getPage(p),vp=pg.getViewport({scale:1.5}),cv=document.createElement('canvas');
    cv.width=vp.width;cv.height=vp.height;
    await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    pgs.push(cv.toDataURL('image/jpeg',.8));
    const tc=await pg.getTextContent(),ph=pg.view[3];
    const lns=[];let cl=[],ly=null;
    for(const it of tc.items){if(!it.str)continue;
      const y=Math.round(it.transform[5]),h=it.height||it.transform[0];
      if(ly!==null&&Math.abs(y-ly)>h*.5){if(cl.length)lns.push([...cl]);cl=[];}
      cl.push({s:it.str,x:it.transform[4],w:it.width,h,y});ly=y;}
    if(cl.length)lns.push([...cl]);
    for(const ln of lns){
      ln.sort((a,b)=>a.x-b.x);let tx='',pe=0;
      for(let i=0;i<ln.length;i++){const it=ln[i],g=it.x-pe,cw=it.w/Math.max(it.s.length,1);
        if(i>0&&g>cw*.3)tx+=' ';tx+=it.s;pe=it.x+it.w;}
      const y=ln[0].y,h=ln[0].h,tr=tx.trim();if(!tr||tr.length<2)continue;
      let tp='text';if(y>ph*.88)tp='header';else if(y<ph*.07)tp='footer';
      else if(h>15&&tr.length<100)tp='heading';
      raw.push({type:tp,text:tr,h});}}
  const mg=[];let bf='';
  for(const b of raw){
    if(b.type==='header'||b.type==='footer'){if(bf.trim())mg.push({type:'paragraph',text:bf.trim()});bf='';mg.push(b);continue;}
    if(b.type==='heading'){if(bf.trim())mg.push({type:'paragraph',text:bf.trim()});bf='';mg.push({type:'chapter',text:b.text});continue;}
    if(bf.endsWith('-'))bf=bf.slice(0,-1)+b.text;
    else if(bf&&!/[.!?":;]$/.test(bf))bf+=' '+b.text;
    else{if(bf.trim())mg.push({type:'paragraph',text:bf.trim()});bf=b.text;}}
  if(bf.trim())mg.push({type:'paragraph',text:bf.trim()});
  return{blocks:mg.filter(b=>b.text.length>3),pages:pgs};}

/* ══════════════ BUILT-IN TEXT CLEANUP ══════════════ */
function autoClean(blocks){
  const fixes=[
    /(\w)\s(tion|sion|ment|ness|able|ible|ing|ous|ive|ful|less|ence|ance|ity|ure|ate|ize|ise)\b/gi,
    /\b(in|un|re|pre|dis|mis|over|under|out)\s(\w{3,})/gi,
    /\b(\w{2,})\s(ly|er|ed|es|al)\b/gi,
  ];
  return blocks.map(b=>{
    if(b.type!=='paragraph')return b;
    let t=b.text;
    fixes.forEach(rx=>{t=t.replace(rx,'$1$2');});
    t=t.replace(/\s{2,}/g,' ').trim();
    return{...b,text:t};
  });
}

/* ══════════════ AI CLEANUP ══════════════ */
async function aiClean(bks,key){
  if(!key)return null;
  const rd=bks.filter(b=>b.type==='paragraph'||b.type==='chapter');
  const s=rd.map((b,i)=>`[${i}|${b.type}] ${b.text}`).join('\n').slice(0,5000);
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      messages:[{role:'user',content:`Fix broken/split words in this PDF text. Return ONLY JSON:\n{"fixes":[{"idx":0,"fixed":"corrected text"}],"chapters":[0,5]}\nfixes=only blocks with broken words. chapters=heading indices.\n\n${s}`}]})});
    const d=await r.json(),tx=(d.content||[]).map(c=>c.text||'').join('');
    return JSON.parse(tx.replace(/```json|```/g,'').trim());}catch(e){console.log('AI:',e);return null;}}

/* ══════════════ COMPUTE ══════════════ */
function comp(){
  RI=BK.map((b,i)=>{if(sm)return(b.type==='paragraph'||b.type==='chapter')?i:-1;return b.type!=='header'&&b.type!=='footer'?i:-1;}).filter(i=>i!==-1);
  CH=[];let c={t:'Start',sr:0,si:RI[0]||0};
  RI.forEach((idx,ri)=>{if(BK[idx].type==='chapter'){if(ri>0)CH.push({...c,er:ri-1});c={t:BK[idx].text,sr:ri,si:idx};}});
  c.er=RI.length-1;CH.push(c);}

function wc(ri){return BK[RI[ri]]?.text.split(/\s+/).length||0;}
function chSec(ci){let s=0;for(let r=CH[ci].sr;r<=CH[ci].er;r++)s+=wc(r)/2.5;return s;}
function chElapsed(ci){const ri=RI.indexOf(cur);if(ri<0)return 0;let s=0;for(let r=CH[ci].sr;r<=Math.min(ri,CH[ci].er);r++)s+=wc(r)/2.5;return s;}
function chPct(ci){const t=chSec(ci);return t?Math.round(chElapsed(ci)/t*100):0;}
function bookSec(){let s=0;CH.forEach((_,i)=>s+=chSec(i));return s;}
function bookElapsed(){let s=0;const ci=curCI();for(let i=0;i<ci;i++)s+=chSec(i);s+=chElapsed(ci);return s;}
function bookPct(){const t=bookSec();return t?Math.round(bookElapsed()/t*100):0;}
function curCI(){if(cur<0)return 0;for(let i=CH.length-1;i>=0;i--)if(cur>=CH[i].si)return i;return 0;}
function fT(s){s=Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

/* ══════════════ RENDER ══════════════ */
function render(){comp();const a=document.getElementById('ct');
  const tw=RI.reduce((a,i)=>a+BK[i].text.split(/\s+/).length,0);
  let h=`<div class="sts"><span>~${Math.ceil(tw/150)} min · ${RI.filter(i=>BK[i].type==='paragraph').length} para · ${CH.length} ch</span><span style="font-weight:600;color:var(--ac)" id="bPt">0%</span></div>`;
  BK.forEach((b,i)=>{
    const sk=sm&&(b.type==='header'||b.type==='footer');
    if(sk){h+=`<div class="bsk" id="b${i}">⚡ Skipped: ${b.text.slice(0,45)}${b.text.length>45?'…':''}</div>`;return;}
    if(b.type==='chapter'){h+=`<div class="bc" id="b${i}" onclick="T(${i})"><h2>${b.text}</h2></div>`;return;}
    h+=`<div class="bp" id="b${i}" onclick="T(${i})"><p>${b.text}</p><button class="bmb${bm.has(i)?' has':''}" onclick="event.stopPropagation();TB(${i})"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg></button></div>`;});
  a.innerHTML=h;rCh();uP();}

function rCh(){const l=document.getElementById('cL');if(!CH.length)return;
  const ci=curCI();

/* ══════════════ TTS ══════════════ */
/* ══════════════════════════════════════════════════════
   MODIFIED: lV() and fVo()
   ONLY CHANGE: fVo now groups voices into Recommended
   (neural/enhanced/premium quality) and All Others,
   so the best voices float to the top of the list.
   lV() logic is identical — only fVo changed.
══════════════════════════════════════════════════════ */
function lV(){
  const ld=()=>{
    VV=speechSynthesis.getVoices();
    if(!VV.length)return;
    const en=VV.filter(v=>v.lang.startsWith('en'));
    SV=en.find(v=>/samantha|google.*female|zira|karen|daniel/i.test(v.name))||en[0]||VV[0];
    fVo();
  };
  ld();
  speechSynthesis.addEventListener('voiceschanged',ld);
}

function fVo(){
  const s=document.getElementById('vS');
  if(!s)return;

  // Score a voice — higher = better quality
  const score=v=>{
    const n=v.name.toLowerCase();
    let sc=0;
    if(n.includes('neural'))    sc+=12;
    if(n.includes('natural'))   sc+=12;
    if(n.includes('enhanced'))  sc+=9;
    if(n.includes('premium'))   sc+=9;
    if(n.includes('google'))    sc+=7;
    if(n.includes('microsoft')) sc+=6;
    if(/samantha|karen|daniel|moira|fiona|aria|jenny|guy/.test(n)) sc+=5;
    if(v.lang==='en-US')        sc+=3;
    else if(v.lang==='en-GB')   sc+=2;
    else if(v.lang.startsWith('en')) sc+=1;
    return sc;
  };

  const en    = VV.filter(v=>v.lang.startsWith('en')).sort((a,b)=>score(b)-score(a));
  const other = VV.filter(v=>!v.lang.startsWith('en')).sort((a,b)=>a.name.localeCompare(b.name));

  // Star mark recommended voices (score ≥ 6)
  const opt=v=>{
    const starred = score(v)>=6 ? ' ★' : '';
    const sel     = v===SV ? ' selected' : '';
    return `<option${sel}>${v.name}${starred}</option>`;
  };

  let html='';
  if(en.length){
    const rec=en.filter(v=>score(v)>=6);
    const rest=en.filter(v=>score(v)<6);
    if(rec.length)  html+=`<optgroup label="★ Recommended English">${rec.map(opt).join('')}</optgroup>`;
    if(rest.length) html+=`<optgroup label="Other English">${rest.map(opt).join('')}</optgroup>`;
  }
  if(other.length){
    html+=`<optgroup label="Other languages">${other.map(v=>{
      const sel=v===SV?' selected':'';
      return`<option${sel}>${v.name} (${v.lang})</option>`;
    }).join('')}</optgroup>`;
  }
  if(!html) html='<option>No voices found — reload page</option>';
  s.innerHTML=html;
}

function pp(t){if(!np)return t;
  return t.replace(/\.\s+/g,'. ... ').replace(/\?\s+/g,'? ... ').replace(/!\s+/g,'! ... ')
    .replace(/,\s+/g,', .. ').replace(/;\s+/g,'; .. ').replace(/:\s+/g,': .. ').replace(/—/g,' — .. ');}

/* ══════════════════════════════════════════════════════
   MODIFIED: spk()
   ONLY ADDITIONS (2 lines inside the function):
     1. startBgAudio()  — launches silent audio keepalive
     2. updateMediaSession(b.text)  — updates lock screen
   Everything else is identical to the original.
══════════════════════════════════════════════════════ */
function spk(idx){
  speechSynthesis.cancel();
  const b=BK[idx];
  if(!b){stp();return;}

  // ── ADDED: keep browser audio session alive ──
  startBgAudio();

  const u=new SpeechSynthesisUtterance(pp(b.text));
  u.rate=spd;u.pitch=1.05;if(SV)u.voice=SV;
  u.onend=()=>{
    const r=RI.indexOf(idx),n=RI[r+1];
    const ci=curCI(),nci=n!==undefined?(()=>{for(let i=CH.length-1;i>=0;i--)if(n>=CH[i].si)return i;return 0;})():-1;
    if(n!==undefined){
      const delay=nci!==ci?800:380;
      setTimeout(()=>{sA(n);spk(n);},delay);
    }else stp();
  };
  sA(idx);

  // ── ADDED: tell OS this is now playing (lock screen) ──
  updateMediaSession(b.text.slice(0,60));

  speechSynthesis.speak(u);
}

function sA(idx){
  if(cur>=0){const o=document.getElementById('b'+cur);if(o)o.classList.remove('act');}
  cur=idx;
  const e=document.getElementById('b'+idx);
  if(e){e.classList.add('act');e.scrollIntoView({behavior:'smooth',block:'center'});}
  uP();
}

/* ══════════════════════════════════════════════════════
   MODIFIED: strt() and stp()
   strt: no change to logic — startBgAudio() is called
         inside spk() so nothing needed here.
   stp: ADDED pauseMediaSession() to update lock screen.
══════════════════════════════════════════════════════ */
function strt(idx){on=true;uBt();spk(idx??RI[0]??0);}
function stp(){
  speechSynthesis.cancel();
  on=false;
  uBt();
  // ── ADDED: update lock screen state ──
  pauseMediaSession();
}

function sk30(d){const ri=RI.indexOf(cur);if(ri<0)return;
  const ci=curCI();let acc=0,target=chElapsed(ci)+d*30;

    if(acc>=target||r2===CH[ci].er){const idx=RI[r2];if(on){speechSynthesis.cancel();spk(idx);}else strt(idx);return;}}}
